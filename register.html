<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal — Register</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Student Portal</h1>
      <p class="subtitle">Create your account</p>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" />
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" />
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" />
      </div>

      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>

      <button onclick="handleRegister()">Register</button>

      <p class="link">Already have an account? <a href="index.html">Login</a></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
